name: Main workflow

on:
  - pull_request
  - push

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - codeberg-medium
        ocaml-compiler:
          - 4.14.x
          - 5.4.x

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use OCaml ${{ matrix.ocaml-compiler }}
        uses: https://github.com/ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          dune-cache: true

      - run: opam install . --deps-only --with-test

      - run: opam exec -- dune build

      - run: opam exec -- dune runtest

  lint-fmt:
    runs-on: codeberg-tiny
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use OCaml 4.14.x
        uses: https://github.com/ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.14.x
          dune-cache: true

      # dune site requires package even when running just @fmt
      - run: opam install goblint

      - name: Lint fmt
        uses: https://github.com/ocaml/setup-ocaml@v3

  lint-doc:
    runs-on: codeberg-tiny
    steps:
      - name: Checkout tree
        uses: actions/checkout@v6

      - name: Set-up OCaml 4.14
        uses: https://github.com/ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.14.x
          dune-cache: true

      - name: Lint doc
        uses: https://github.com/ocaml/setup-ocaml/lint-doc@v3
